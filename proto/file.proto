syntax = "proto3";

package file.v1;

option go_package = "echolist-backend/proto/gen/file/v1;filev1";

service FileService {
  rpc CreateFolder (CreateFolderRequest) returns (CreateFolderResponse);
  rpc ListFiles (ListFilesRequest) returns (ListFilesResponse);
  rpc UpdateFolder (UpdateFolderRequest) returns (UpdateFolderResponse);
  rpc DeleteFolder (DeleteFolderRequest) returns (DeleteFolderResponse);
}

message Folder {
  string path = 1;
  string name = 2;
}

message CreateFolderRequest {
  // Relative path to the parent directory. Empty string for root.
  // Must not start with "/", must not contain ".." segments.
  string parent_dir = 1;
  string name = 2;
}

message CreateFolderResponse {
  Folder folder = 1;
}

message ListFilesRequest {
  // Relative path to the parent directory. Empty string for root.
  // Must not start with "/", must not contain ".." segments.
  string parent_dir = 1;
}

enum ItemType {
  ITEM_TYPE_UNSPECIFIED = 0;
  ITEM_TYPE_FOLDER = 1;
  ITEM_TYPE_NOTE = 2;
  ITEM_TYPE_TASK_LIST = 3;
}

message FolderMetadata {
  int32 child_count = 1;
}

message NoteMetadata {
  int64 updated_at = 1;
  string preview = 2;
}

message TaskListMetadata {
  int64 updated_at = 1;
  int32 total_task_count = 2;
  int32 done_task_count = 3;
}

message FileEntry {
  string path = 1;
  string title = 2;
  ItemType item_type = 3;
  oneof metadata {
    FolderMetadata folder_metadata = 4;
    NoteMetadata note_metadata = 5;
    TaskListMetadata task_list_metadata = 6;
  }
}

message ListFilesResponse {
  repeated FileEntry entries = 1;
}

message UpdateFolderRequest {
  // Relative path to the folder. Must not start with "/", must not contain ".." segments.
  string folder_path = 1;
  string new_name = 2;
}

message UpdateFolderResponse {
  Folder folder = 1;
}

message DeleteFolderRequest {
  // Relative path to the folder. Must not start with "/", must not contain ".." segments.
  string folder_path = 1;
}

message DeleteFolderResponse {}
